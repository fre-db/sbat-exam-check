name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: sbat-mac
            zip: sbat-mac.zip
          - os: windows-latest
            artifact: sbat-windows
            zip: sbat-windows.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sbat_checker_qt.spec --noconfirm

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r -9 ${{ matrix.zip }} sbat_checker_qt.app/

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\sbat_checker_qt\* -DestinationPath dist\${{ matrix.zip }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.zip }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sbat-mac/sbat-mac.zip
            artifacts/sbat-windows/sbat-windows.zip
          generate_release_notes: true
